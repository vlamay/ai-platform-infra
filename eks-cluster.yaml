apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ai-platform-prod
  region: us-east-1
  version: "1.28"

managedNodeGroups:
  - name: ai-workers
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 5
    volumeSize: 20
    ssh:
      allow: false
    labels:
      role: worker
      environment: production
    tags:
      Environment: production
      Project: ai-platform
      ManagedBy: eksctl

iam:
  withOIDC: true

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest

cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator", "controllerManager", "scheduler"]
