# Example secret for OpenAI API credentials
# DO NOT commit actual secrets to git!
# 
# To create the secret, run:
# kubectl create secret generic openai-credentials \
#   --from-literal=api-key=YOUR_OPENAI_API_KEY \
#   -n ai-services
#
# Or use this template with base64 encoded value:
# echo -n "your-api-key" | base64

apiVersion: v1
kind: Secret
metadata:
  name: openai-credentials
  namespace: ai-services
type: Opaque
data:
  # Replace with actual base64 encoded API key
  # This is a placeholder - DO NOT USE IN PRODUCTION
  api-key: cGxhY2Vob2xkZXItcmVwbGFjZS13aXRoLXJlYWwta2V5
